name: CI

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-compiler:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build build-essential curl
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install cmake ninja
          else
            choco install cmake ninja
          fi

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - run: chmod +x scripts/*.sh || true

      - name: Sync C3 Compiler
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Cache compiler build
        uses: actions/cache@v5
        with:
          path: c3c/build
          key: c3-build-${{ runner.os }}-${{ hashFiles('c3c/CMakeLists.txt') }}
          restore-keys: |
            c3-build-${{ runner.os }}-

      - name: Build compiler
        run: ./scripts/compiler.sh

      - name: Upload compiler binary
        uses: actions/upload-artifact@v5
        with:
          name: c3c-${{ runner.os }}
          path: |
            c3c/build/c3c*
            c3c/build/*.dll
            c3c/build/*.dylib
            c3c/build/*.so

  run-tests:
    needs: build-compiler

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: compiler
          - os: macos-latest
            target: compiler
          - os: windows-latest
            target: compiler
          - os: ubuntu-latest
            target: vendor

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - run: chmod +x scripts/*.sh || true

      - name: Sync C3 Compiler repo
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Download compiler
        uses: actions/download-artifact@v5
        with:
          name: c3c-${{ runner.os }}
          path: c3c/build

      - name: Ensure compiler executable
        run: chmod +x c3c/build/c3c || true

      - name: Sync Vendor
        if: matrix.target == 'vendor'
        run: ./scripts/sync.sh https://github.com/c3lang/vendor.git vendor

      - name: Run Tests
        continue-on-error: true
        run: ./scripts/run_tests.sh ${{ matrix.target }}

      - name: Upload results
        uses: actions/upload-artifact@v5
        with:
          name: results-${{ runner.os }}-${{ matrix.target }}
          path: results-*/.test_results

  summary:
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all test results
        uses: actions/download-artifact@v5
        with:
          path: results

      - run: chmod +x scripts/*.sh || true

      - name: Generate summary
        run: ./scripts/summary.sh
