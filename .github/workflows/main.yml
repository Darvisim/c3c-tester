name: CI

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  c3-matrix-ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [compiler, vendor]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Dependencies
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build build-essential curl
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install cmake ninja
          else
            choco install cmake ninja
          fi

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Sync C3 Compiler Repository
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Sync Vendor Repository
        if: matrix.target == 'vendor'
        run: ./scripts/sync.sh https://github.com/c3lang/vendor.git vendor

      - name: Build C3 Compiler
        run: ./scripts/compiler.sh

      - name: Run Tests
        continue-on-error: true
        run: ./scripts/run_tests.sh ${{ matrix.target }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os }}-${{ matrix.target }}
          path: results-*/.test_results

  summary:
    needs: c3-matrix-ci
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v5
  
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
  
      - name: Generate summary
        run: ./scripts/summary.sh
