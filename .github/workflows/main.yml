name: CI

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-compiler:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: &checkout actions/checkout@v5

      - name: Setup Dependencies
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build build-essential curl
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install cmake ninja
          else
            choco install cmake ninja
          fi

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - run: chmod +x scripts/*.sh || true

      - name: Sync C3 Compiler
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Build compiler
        run: ./scripts/compiler.sh

      - name: Upload compiler
        uses: &upload actions/upload-artifact@v6
        with:
          name: c3c-${{ runner.os }}
          path: c3c/build


  run-tests:
    needs: build-compiler

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [compiler, vendor]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: *checkout

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - run: chmod +x scripts/*.sh || true
 
      - name: Sync C3 Compiler repo
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Download compiler
        uses: actions/download-artifact@v7
        with:
          name: c3c-${{ runner.os }}
          path: c3c/build

      - name: Sync Vendor
        if: matrix.target == 'vendor'
        run: ./scripts/sync.sh https://github.com/c3lang/vendor.git vendor

      - name: Run Tests
        continue-on-error: true
        run: ./scripts/run_tests.sh ${{ matrix.target }}

      - name: Upload results
        uses: *upload
        with:
          name: results-${{ runner.os }}-${{ matrix.target }}
          path: results-*/test_results.txt


  summary:
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - uses: *checkout

      - name: Download all test results
        uses: actions/download-artifact@v7
        with:
          path: results

      - run: chmod +x scripts/*.sh || true

      - name: Generate summary
        run: ./scripts/summary.sh

