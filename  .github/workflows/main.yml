name: CI

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-compiler:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v5

      - &chmod
        name: Make scripts executable
        run: chmod +x scripts/*.sh || true

      - name: Setup Dependencies
        run: ./scripts/setup.sh

      - &msvc
        name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache C3 Compiler Repo
        uses: &cache actions/cache@v5
        with:
          path: c3c
          key: ${{ runner.os }}-c3c-repo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - &sync
        name: Sync C3 Compiler
        run: ./scripts/sync.sh https://github.com/c3lang/c3c.git c3c

      - name: Cache LLVM
        uses: *cache
        with:
          path: c3c/build/_deps
          key: ${{ runner.os }}-llvm-${{ hashFiles('c3c/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-

      - name: Build Compiler
        run: ./scripts/compiler.sh

      - name: Upload Compiler
        uses: &upload actions/upload-artifact@v6
        with:
          name: c3c-${{ runner.os }}
          path: c3c/build
          retention-days: 1


  run-tests:
    name: Test (${{ matrix.os }}, ${{ matrix.target }})
    needs: build-compiler
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [stdlib, benchmarks, resources, test, fuzz]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - *checkout
      - *chmod
      - *msvc

      - name: Restore Cached C3 Compiler Repo
        uses: actions/cache/restore@v5
        with:
          path: c3c
          key: ${{ runner.os }}-c3c-repo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - *sync

      - name: Download Compiler
        uses: &download actions/download-artifact@v7
        with:
          name: c3c-${{ runner.os }}
          path: c3c/build

      - name: Run Tests
        id: tests
        continue-on-error: true
        run: ./scripts/run_tests.sh ${{ matrix.target }}

      - name: Upload Test Results
        uses: *upload
        with:
          name: results-${{ runner.os }}-${{ matrix.target }}
          path: results-*/test_results.txt
          retention-days: 1

  summary:
    name: Final Test Results
    needs: run-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        shell: bash

    steps:
      - *checkout
      - *chmod

      - name: Download all test results
        uses: *download
        with:
          path: results

      - name: Generate Summary
        run: ./scripts/summary.sh